datafabrik:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'postgres') }}"
      user: "{{ env_var('DBT_USER', 'datafabrik') }}"
      password: "{{ env_var('DBT_PASSWORD', 'datafabrik') }}"
      port: 5432
      dbname: "{{ env_var('DBT_DB', 'datafabrik') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'analytics') }}"
      threads: 4
