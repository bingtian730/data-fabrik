version: 2

sources:
  - name: raw
    schema: raw
    description: Raw ingested tables before any transformation.
    tables:
      - name: customers
        description: Customer records ingested from ACME Postgres. Contains dirty data (mixed-case status, inconsistent phone formats, trailing spaces).
        columns:
          - name: customer_id
            description: Unique customer identifier.
          - name: first_name
          - name: last_name
          - name: email
          - name: phone
          - name: status
            description: Raw status value — may be Active/ACTIVE/active/Inactive/INACTIVE/suspended.
          - name: created_at
          - name: updated_at

      - name: invoices
        description: Invoice records from ACME Postgres. Amount stored as TEXT with variable decimal precision; currency and status values are mixed case.
        columns:
          - name: invoice_id
          - name: customer_id
          - name: amount
            description: Raw amount as TEXT — may have extra decimal places (e.g. 2100.999).
          - name: currency
            description: Raw currency code — may be USD/usd/Usd.
          - name: status
            description: Raw status — may be paid/Paid/PAID/unpaid/UNPAID/overdue/Overdue/cancelled.
          - name: issue_date
          - name: paid_at
            description: NULL for unpaid/overdue invoices.
          - name: updated_at

      - name: customer_orders
        description: Customer order line items. Quantity and unit_price stored as TEXT; product names have trailing spaces; status is mixed case.
        columns:
          - name: order_id
          - name: customer_id
          - name: invoice_id
          - name: product_name
            description: Raw product name — may have trailing/leading spaces and inconsistent casing.
          - name: quantity
            description: Raw quantity as TEXT float (e.g. 2.0 instead of 2).
          - name: unit_price
            description: Raw unit price as TEXT — may have extra decimal places.
          - name: status
          - name: ordered_at
          - name: updated_at
