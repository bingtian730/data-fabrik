pipeline_id: acme_orders_daily
description: Ingest ACME order data from Postgres and build daily revenue summary
owner: data-platform
tags: [acme, orders, demo]

schedule:
  preset: "@daily"
  start_date: "2026-01-01T00:00:00"
  timezone: UTC
  catchup: false
  retries: 2
  retry_delay_minutes: 5

stages:
  ingestion:
    type: jdbc
    connection_id: acme_postgres
    table: public.orders
    watermark_column: updated_at

  transformation:
    type: dbt
    select: stg_acme_orders_daily acme_orders_daily_summary

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.stg_acme_orders_daily
      min_rows: 1

  delivery:
    type: s3_publish
    source_prefix: acme/orders/
    dest_bucket: datafabrik-curated
    dest_prefix: acme/orders/
