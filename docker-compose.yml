x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "5"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "10"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-please-change-me}
    AIRFLOW__WEBSERVER__X_FRAME_ENABLED: "False"
    AIRFLOW__WEBSERVER__WTF_CSRF_ENABLED: "False"
    AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8082"
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    AWS_ENDPOINT_URL: http://minio:9000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./orchestration/airflow/plugins:/opt/airflow/plugins
    - ./orchestration/airflow/configs:/opt/airflow/configs
    - ./pipelines:/opt/airflow/pipelines
    - airflow-logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"

services:
  postgres:
    image: postgres:15-alpine
    container_name: datafabrik-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: datafabrik-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000'"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    container_name: datafabrik-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/create-buckets.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./infra/docker/minio/create-buckets.sh:/scripts/create-buckets.sh:ro
    restart: "no"

  airflow-init:
    <<: *airflow-common
    container_name: datafabrik-airflow-init
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        chmod -R 777 /opt/airflow/logs && \
        airflow db migrate && \
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@datafabrik.local || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: datafabrik-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: datafabrik-airflow-scheduler
    user: "0:0"
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  presto:
    image: prestodb/presto:0.289
    container_name: datafabrik-presto
    ports:
      - "8081:8080"
    volumes:
      - ./infra/docker/presto/catalog:/opt/presto-server/etc/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: datafabrik-dbt
    platform: linux/amd64
    entrypoint: ["sleep", "infinity"]
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      DBT_HOST: postgres
      DBT_USER: datafabrik
      DBT_PASSWORD: datafabrik
      DBT_DB: datafabrik
      DBT_SCHEMA: analytics
    volumes:
      - ./dbt/datafabrik_models:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: infra/docker/fastapi/Dockerfile
    container_name: datafabrik-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./orchestration/airflow/configs:/app/configs
      - ./dbt/datafabrik_models/models:/app/dbt_models
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql+psycopg2://datafabrik:datafabrik@postgres:5432/datafabrik
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PRESTO_HOST: presto
      PRESTO_PORT: "8080"
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USER: ${AIRFLOW_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nginx-proxy:
    image: nginx:alpine
    container_name: datafabrik-nginx-proxy
    ports:
      - "3001:3001"
      - "8082:8082"
      - "9002:9002"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - metabase
      - minio
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.51.5
    container_name: datafabrik-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: datafabrik
      MB_DB_PASS: datafabrik
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
