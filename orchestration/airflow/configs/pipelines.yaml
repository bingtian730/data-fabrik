---
pipeline_id: stripe_daily
description: Ingest Stripe charges, build revenue models via dbt, validate, and publish to curated.
tags: [stripe, revenue, payments]

schedule:
  preset: "@daily"
  retries: 1

stages:
  ingestion:
    type: s3_csv
    source_bucket: customer-landing
    source_key: stripe/*.csv
    dest_bucket: datafabrik-raw
    dest_prefix: stripe/{{ ds }}/

  transformation:
    type: dbt
    project_dir: /usr/app/dbt
    profiles_dir: /usr/app/dbt
    select: stripe
    target: dev

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.stg_stripe_charges
      min_rows: 1
    - type: row_count
      connection_id: postgres_default
      table: analytics.stripe_daily_revenue
      min_rows: 1

  delivery:
    type: s3_publish
    source_bucket: datafabrik-raw
    source_prefix: stripe/{{ ds }}/
    dest_bucket: datafabrik-curated
    dest_prefix: stripe/{{ ds }}/

---
pipeline_id: stripe_postgres_ingestion
description: Incrementally extract Stripe charges from Postgres into S3 as Parquet.
tags: [stripe, postgres, ingestion, incremental]

schedule:
  preset: "@daily"
  retries: 1

stages:
  ingestion:
    type: jdbc
    connection_id: postgres_default
    table: public.stripe_charges_raw
    dest_bucket: datafabrik-raw
    dest_prefix: stripe/postgres/

  validation:
    - type: row_count
      connection_id: postgres_default
      table: pipeline_metadata.ingestion_log
      min_rows: 1

  delivery:
    type: s3_publish
    source_bucket: datafabrik-raw
    source_prefix: stripe/postgres/{{ ds }}/
    dest_bucket: datafabrik-curated
    dest_prefix: stripe/postgres/{{ ds }}/

---
pipeline_id: example_customer_daily
description: Reference pipeline showing every stage type wired via YAML.
tags: [example, customer]

schedule:
  cron: "0 6 * * *"

stages:
  ingestion:
    type: s3_csv
    source_bucket: customer-landing
    source_key: daily/*.csv
    dest_bucket: datafabrik-raw
    dest_prefix: example_customer/{{ ds }}/

  transformation:
    type: dbt
    project_dir: /usr/app/dbt
    profiles_dir: /usr/app/dbt
    select: example
    target: dev

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.example
      min_rows: 1
    - type: row_count
      connection_id: postgres_default
      table: analytics.example
      min_rows: 1

  delivery:
    type: s3_publish
    source_bucket: datafabrik-curated
    source_prefix: example_customer/{{ ds }}/
    dest_bucket: customer-delivery
    dest_prefix: example_customer/{{ ds }}/
