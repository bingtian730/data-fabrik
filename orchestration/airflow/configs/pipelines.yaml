---
pipeline_id: acme_daily
description: Dummy pipeline for testing the dynamic factory end-to-end.
tags: [dummy, acme]

schedule:
  preset: "@daily"
  retries: 1

stages:
  ingestion:
    type: http_api
    url: https://jsonplaceholder.typicode.com/todos
    method: GET
    dest_bucket: datafabrik-raw
    dest_key: acme/{{ ds }}/todos.json

  transformation:
    type: dbt
    project_dir: /usr/app/dbt
    profiles_dir: /usr/app/dbt
    select: acme
    target: dev

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.acme_todos
      min_rows: 1

  delivery:
    type: s3_publish
    source_bucket: datafabrik-raw
    source_prefix: acme/{{ ds }}/
    dest_bucket: datafabrik-curated
    dest_prefix: acme/{{ ds }}/

---
pipeline_id: acme_orders_daily
description: Ingest ACME order data from Postgres and build daily revenue summary
tags: [acme, orders, demo]

schedule:
  preset: "@daily"
  retries: 2

stages:
  ingestion:
    type: jdbc
    connection_id: acme_postgres
    table: public.orders

  transformation:
    type: dbt
    select: stg_acme_orders_daily acme_orders_daily_summary

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.stg_acme_orders_daily
      min_rows: 1

  delivery:
    type: s3_publish
    source_prefix: acme/orders/
    dest_bucket: datafabrik-curated
    dest_prefix: acme/orders/

