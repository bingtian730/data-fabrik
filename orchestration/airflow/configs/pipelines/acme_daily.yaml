pipeline_id: acme_daily
description: Dummy pipeline for testing the dynamic factory end-to-end.
owner: data-platform
tags:
  - dummy
  - acme

schedule:
  preset: "@daily"
  timezone: UTC
  start_date: 2026-01-01T00:00:00
  catchup: false
  max_active_runs: 1
  retries: 1
  retry_delay_minutes: 5

stages:
  ingestion:
    type: http_api
    url: https://jsonplaceholder.typicode.com/todos
    method: GET
    dest_bucket: datafabrik-raw
    dest_key: acme/{{ ds }}/todos.json

  transformation:
    type: dbt
    project_dir: /usr/app/dbt
    profiles_dir: /usr/app/dbt
    select: acme
    target: dev

  validation:
    - type: row_count
      connection_id: postgres_default
      table: analytics.acme_todos
      min_rows: 1

  delivery:
    type: s3_publish
    source_bucket: datafabrik-raw
    source_prefix: acme/{{ ds }}/
    dest_bucket: datafabrik-curated
    dest_prefix: acme/{{ ds }}/
