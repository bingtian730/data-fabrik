events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    # ── Metabase proxy on :3001 ───────────────────────────────────────────
    # Strips X-Frame-Options and CSP frame-ancestors so Metabase can be
    # embedded in the DataFabrik portal iframe.
    server {
        listen 3001;

        location / {
            set $upstream_metabase http://metabase:3000;
            proxy_pass $upstream_metabase;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            # Allow framing from any origin (local dev only)
            add_header Content-Security-Policy
                "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" always;

            proxy_redirect http://metabase:3000 http://localhost:3001;

            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }

    # ── Airflow proxy on :8082 ───────────────────────────────────────────
    # Strips X-Frame-Options so Airflow can be embedded in the portal iframe.
    server {
        listen 8082;

        location / {
            set $upstream_airflow http://airflow-webserver:8080;
            proxy_pass $upstream_airflow;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            add_header Content-Security-Policy
                "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" always;

            proxy_redirect http://airflow-webserver:8080 http://localhost:8082;

            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }

    # ── MinIO console proxy on :9002 ─────────────────────────────────────
    # Strips X-Frame-Options and handles WebSocket upgrades for the console.
    server {
        listen 9002;

        location / {
            set $upstream_minio http://minio:9001;
            proxy_pass $upstream_minio;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (MinIO console uses WS for live updates)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            add_header Content-Security-Policy
                "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" always;

            proxy_redirect http://minio:9001 http://localhost:9002;

            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }
}
